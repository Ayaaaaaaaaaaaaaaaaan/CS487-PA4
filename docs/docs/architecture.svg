<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>TaskFlow Azure Architecture Diagram</title>
<desc>End-to-end architecture showing GitHub, App Service, Durable Functions, AKS, ACI, Blob Storage, ACR, and Managed Identity</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th { font-size: 13px; font-weight: 600; }
    .ts { font-size: 11px; font-weight: 400; fill: #444; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #26215C; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #04342C; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #4A1B0C; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #412402; }
    .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text { fill: #173404; }
    line, path { stroke: #888780; }
  </style>
</defs>

<!-- ROW 1: GitHub + User -->
<g class="c-gray">
  <rect x="40" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="62" text-anchor="middle" dominant-baseline="central">GitHub repo</text>
  <text class="ts" x="110" y="80" text-anchor="middle" dominant-baseline="central">CS487-PA4 fork</text>
</g>
<g class="c-gray">
  <rect x="500" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="570" y="62" text-anchor="middle" dominant-baseline="central">User browser</text>
  <text class="ts" x="570" y="80" text-anchor="middle" dominant-baseline="central">Submit order</text>
</g>

<!-- ROW 2: App Service -->
<rect x="30" y="155" width="620" height="90" rx="10" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" x="46" y="148" dominant-baseline="central">App Service Plan  pa4-27100269 (B1)</text>
<g class="c-blue">
  <rect x="220" y="168" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="190" text-anchor="middle" dominant-baseline="central">App Service Web App</text>
  <text class="ts" x="340" y="208" text-anchor="middle" dominant-baseline="central">pa4-27100269  Node 22-lts</text>
</g>

<!-- CI/CD arrow -->
<line x1="110" y1="96" x2="110" y2="155" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="110" y1="155" x2="220" y2="186" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="60" y="130" text-anchor="middle">CI/CD</text>
<text class="ts" x="60" y="144" text-anchor="middle">push deploy</text>

<!-- User to Web App -->
<line x1="500" y1="68" x2="462" y2="168" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="505" y="128" text-anchor="start">HTTPS</text>

<!-- ROW 3: Function App -->
<rect x="30" y="310" width="620" height="100" rx="10" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" x="46" y="303" dominant-baseline="central">Function App  pa4-27100269-func  (containerised, Python 3.11)</text>
<g class="c-purple">
  <rect x="50" y="323" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="120" y="345" text-anchor="middle" dominant-baseline="central">http_starter</text>
  <text class="ts" x="120" y="363" text-anchor="middle" dominant-baseline="central">HTTP trigger</text>
</g>
<g class="c-purple">
  <rect x="220" y="323" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="300" y="345" text-anchor="middle" dominant-baseline="central">my_orchestrator</text>
  <text class="ts" x="300" y="363" text-anchor="middle" dominant-baseline="central">Durable, checkpoints</text>
</g>
<g class="c-purple">
  <rect x="406" y="323" width="115" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="463" y="341" text-anchor="middle" dominant-baseline="central">validate_</text>
  <text class="th" x="463" y="357" text-anchor="middle" dominant-baseline="central">activity</text>
  <text class="ts" x="463" y="372" text-anchor="middle" dominant-baseline="central">HTTP call</text>
</g>
<g class="c-purple">
  <rect x="540" y="323" width="100" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="590" y="341" text-anchor="middle" dominant-baseline="central">report_</text>
  <text class="th" x="590" y="357" text-anchor="middle" dominant-baseline="central">activity</text>
  <text class="ts" x="590" y="372" text-anchor="middle" dominant-baseline="central">SDK: ACI</text>
</g>

<!-- Web App to http_starter -->
<line x1="310" y1="224" x2="200" y2="310" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="200" y1="310" x2="150" y2="323" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="175" y="275" text-anchor="middle">start + poll</text>
<line x1="190" y1="351" x2="220" y2="351" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="380" y1="351" x2="406" y2="351" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="380" y1="365" x2="406" y2="375" stroke="#888780" stroke-width="1"/>
<line x1="406" y1="375" x2="540" y2="375" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="473" y="393" text-anchor="middle">if valid</text>

<!-- ROW 4: AKS + ACR + ACI -->
<g class="c-teal">
  <rect x="40" y="490" width="190" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="135" y="514" text-anchor="middle" dominant-baseline="central">AKS cluster</text>
  <text class="ts" x="135" y="532" text-anchor="middle" dominant-baseline="central">pa4-27100269</text>
  <text class="ts" x="135" y="548" text-anchor="middle" dominant-baseline="central">validate-api  port 8080</text>
</g>
<g class="c-coral">
  <rect x="265" y="490" width="160" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="345" y="514" text-anchor="middle" dominant-baseline="central">Azure Container</text>
  <text class="th" x="345" y="530" text-anchor="middle" dominant-baseline="central">Registry</text>
  <text class="ts" x="345" y="548" text-anchor="middle" dominant-baseline="central">pa427100269</text>
</g>
<g class="c-amber">
  <rect x="460" y="490" width="180" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="510" text-anchor="middle" dominant-baseline="central">Container Instance</text>
  <text class="ts" x="550" y="528" text-anchor="middle" dominant-baseline="central">ci-report-{order_id}</text>
  <text class="ts" x="550" y="546" text-anchor="middle" dominant-baseline="central">ephemeral, per run</text>
</g>

<!-- validate_activity to AKS -->
<line x1="463" y1="379" x2="463" y2="460" stroke="#888780" stroke-width="1"/>
<line x1="463" y1="460" x2="200" y2="490" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="315" y="476" text-anchor="middle">POST /validate</text>

<!-- report_activity to ACI -->
<line x1="590" y1="379" x2="590" y2="490" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="614" y="440" text-anchor="start">SDK create</text>

<!-- ACR image pulls -->
<line x1="265" y1="520" x2="230" y2="520" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="248" y="513" text-anchor="middle">image pull</text>
<line x1="425" y1="520" x2="460" y2="520" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="443" y="513" text-anchor="middle">image pull</text>
<line x1="345" y1="490" x2="345" y2="410" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="360" y="455" text-anchor="start">func image</text>

<!-- ROW 5: Blob + MI + Storage -->
<g class="c-green">
  <rect x="40" y="640" width="190" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="135" y="664" text-anchor="middle" dominant-baseline="central">Blob Storage</text>
  <text class="ts" x="135" y="682" text-anchor="middle" dominant-baseline="central">pa427100269</text>
  <text class="ts" x="135" y="698" text-anchor="middle" dominant-baseline="central">reports container</text>
</g>
<g class="c-gray">
  <rect x="265" y="640" width="180" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="355" y="660" text-anchor="middle" dominant-baseline="central">Managed Identity</text>
  <text class="ts" x="355" y="678" text-anchor="middle" dominant-baseline="central">mi-pa4-27100269</text>
  <text class="ts" x="355" y="696" text-anchor="middle" dominant-baseline="central">no secrets in code</text>
</g>
<g class="c-green">
  <rect x="480" y="640" width="160" height="66" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="660" text-anchor="middle" dominant-baseline="central">Storage Account</text>
  <text class="ts" x="560" y="678" text-anchor="middle" dominant-baseline="central">pa427100269</text>
  <text class="ts" x="560" y="696" text-anchor="middle" dominant-baseline="central">Durable state + blobs</text>
</g>

<!-- ACI to Blob (PDF write) -->
<line x1="550" y1="556" x2="550" y2="610" stroke="#888780" stroke-width="1"/>
<line x1="550" y1="610" x2="200" y2="640" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="430" y="600" text-anchor="middle">write PDF</text>

<!-- MI to Function App -->
<line x1="355" y1="640" x2="355" y2="420" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="372" y="555" text-anchor="start">auth</text>

<!-- Function App to Storage Account -->
<line x1="560" y1="410" x2="560" y2="640" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Legend -->
<rect x="30" y="755" width="620" height="50" rx="8" fill="none" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="50" y="774" dominant-baseline="central">Legend:</text>
<line x1="110" y1="780" x2="150" y2="780" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="156" y="780" dominant-baseline="central">HTTPS / HTTP call</text>
<line x1="290" y1="780" x2="330" y2="780" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="336" y="780" dominant-baseline="central">Image pull / auth</text>
<rect x="476" y="772" width="12" height="12" rx="2" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
<text class="ts" x="494" y="780" dominant-baseline="central">Service boundary</text>

</svg>
